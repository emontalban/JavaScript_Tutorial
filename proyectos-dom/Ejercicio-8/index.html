<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
    </head>
    <body>
        <div class="widget">
            <input type="text" id="chat-input">
            <button id="msgBtn" onclick="sendMenssage()">Submit</button>
            <button onclick="clearMessages()">
                Clear Messages
            </button>
        </div>

        <script>
            function sendMenssage(){
                const newDiv = document.createElement('div');
                newDiv.classList.add('chatMsg');
                let chatInput = document.querySelector('#chat-input').value;
                console.log(chatInput);
                const newContent = document.createTextNode(chatInput);
                newDiv.appendChild(newContent);

                const widget = document.querySelector('.widget');
                let chatWrapper = document.querySelector('#widget');
                document.querySelector('#chat-input').value = "";


                if(document.querySelectorAll('.chatMsg').length > 0){
                    chatWrapper = document.querySelectorAll('.chatMsg')[0]
                }

                widget.insertBefore(newDiv, chatWrapper);
            }
            function clearMessages(){
                const menssages = document.querySelectorAll('.chatMsg');
                menssages.forEach(menssage => menssage.remove());
            }
        </script>
    </body>
</html>
